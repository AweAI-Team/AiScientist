vars:
  time_limit: &time_limit 86400

defaults: &defaults
  start: aisci/start.sh
  dockerfile: aisci/Dockerfile
  kwargs_type: argparse

# HTTP_PROXY / HTTPS_PROXY default to empty strings so the keys are always passed into the
# container; set real values in the host environment before run_agent.py if you use a proxy.

# =============================================================================
# Context window values — design notes
# =============================================================================
#
# AISCI_CONTEXT_WINDOW is the tiktoken-estimated token budget for the input side.
# It controls when prune_messages() triggers (before the API call hits a hard error).
#
# For GPT models the tiktoken (o200k_base / cl100k_base) tokenizer closely matches
# the model's actual tokenizer, so:
#   CONTEXT_WINDOW = total_context - MAX_TOKENS  (no correction needed)
#
# For GLM models the tokenizer differs: GLM's actual token count is ~1.26x higher
# than tiktoken's estimate for the same text (measured empirically on GLM workloads:
# tiktoken 184171 → GLM-5 actual ≈ 184172 × 1.26). This means a tiktoken-based
# window of 182272 would silently overflow the real 182272-token hard limit.
#
# Correction: CONTEXT_WINDOW = (total_context - MAX_TOKENS) / 1.26 - 5000 (safety buffer)
#   GLM-5:  (202752 - 20480) / 1.26 - 5000 ≈ 139660
#   GLM-4.7:(200000 - 32768) / 1.26 - 5000 ≈ 127700
#
# The - 5000 leaves ~5K tiktoken tokens (~6.3K GLM tokens) as additional margin
# so a single large tool response won't tip the prune threshold into the hard limit.
#
# =============================================================================
# GPT models
# =============================================================================

# GPT — Chat Completions API (backward compatible, no web search / reasoning)
# Context: 400000 total; MAX_TOKENS=32768 output; CONTEXT_WINDOW=367232 input prune threshold
# GPT tokenizer ≈ tiktoken, no correction needed.
aisci/gpt-5.2:
  <<: *defaults
  env_vars:
    TIME_LIMIT_SECS: *time_limit
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
    AISCI_MODEL: "gpt-5.2-2025-12-11"
    AISCI_API_MODE: "completions"
    AISCI_MAX_TOKENS: "32768"
    AISCI_CONTEXT_WINDOW: "367232"
    AISCI_MAX_STEPS: "500"
    AISCI_IMPL_TIME: "28800"
    AISCI_EXP_TIME: "14400"
    AISCI_CONFIG_PROFILE: "default"
    AISCI_REMINDER_FREQ: "5"
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    http_proxy: ""
    https_proxy: ""
    NO_PROXY: "localhost,127.0.0.1,::1"
    no_proxy: "localhost,127.0.0.1,::1"
    HF_ENDPOINT: "https://huggingface.co"

# GPT — Responses API (web_search_preview + reasoning)
# Context: 400000 total; MAX_TOKENS=32768 output (=1024*32 max response cap)
# CONTEXT_WINDOW = 400000 - 32768 = 367232 (input prune threshold; GPT tokenizer ≈ tiktoken)
