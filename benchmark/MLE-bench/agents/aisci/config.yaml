# =============================================================================
# Gemini models
# =============================================================================
#
# Gemini uses the OpenAI-compatible endpoint (CompletionsLLMClient).
# Client: OpenAI(base_url=OPENAI_BASE_URL).  Do NOT set AZURE_OPENAI_ENDPOINT.
#
# Context: ~1,048,576 tokens (1M); max output per profile in AISCI_MAX_TOKENS
#   (API allows up to 65,536 including thinking; Flash uses 20,480 to match GLM-5).
# Tokenizer: Gemini's proprietary tokenizer. Initial estimate ≈ 1.0× tiktoken
#   (no correction applied).  If actual ratio > 1.0 the API will return a
#   context-length 400 error, which the retry handler converts to
#   ContextLengthError → automatic pruning.
#
#   CONTEXT_WINDOW = 1,000,000 − AISCI_MAX_TOKENS (e.g. 934,464 for 65,536 out;
#   979,520 for Flash with 20,480 out).
#
# Temperature: Gemini 3 strongly recommends 1.0 — lower values cause reasoning
#   loops.  Set via AISCI_TEMPERATURE (not the default None → NOT_GIVEN).
#
# Reasoning: reasoning_effort is sent via extra_body (maps to thinking_level).
#   "high" enables Dynamic Thinking (deepest).
#
# Thought Signatures: Gemini 3 tool_calls include extra_content with
#   thought_signature that must be passed back.  The framework preserves this
#   via ToolCallResult.extra_content (no model-specific code needed).

# Gemini 3 Flash — Chat Completions API (OpenAI-compatible endpoint)
# AISCI_MAX_TOKENS=20480 matches GLM-5 output cap; CONTEXT_WINDOW = 1_000_000 − 20480.
aisci/gemini-3-flash:
  <<: *defaults
  env_vars:
    TIME_LIMIT_SECS: *time_limit
    # Same env name as other Completions agents: run scripts export OPENAI_API_KEY.
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    OPENAI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/openai/"
    AISCI_MODEL: "gemini-3-flash-preview"
    AISCI_API_MODE: "completions"
    AISCI_REASONING_EFFORT: "high"
    AISCI_TEMPERATURE: "1.0"
    AISCI_MAX_TOKENS: "20480"
    AISCI_CONTEXT_WINDOW: "979520"
    AISCI_CONTEXT_REDUCE_STRATEGY: "summary"
    AISCI_MAX_STEPS: "500"
    AISCI_IMPL_TIME: "28800"
    AISCI_EXP_TIME: "14400"
    AISCI_CONFIG_PROFILE: "default"
    AISCI_REMINDER_FREQ: "5"
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    http_proxy: ""
    https_proxy: ""
    NO_PROXY: "localhost,127.0.0.1,::1"
    no_proxy: "localhost,127.0.0.1,::1"
    HF_ENDPOINT: "https://huggingface.co"

