# GLM-5 — Azure OpenAI Chat Completions (same gateway as aisci/glm-5; see agents/aisci/config.yaml).
# Patched aideml routes ``glm-*`` to backend_openai + AzureOpenAI when AZURE_OPENAI_ENDPOINT is set.
aide/glm-5:
  <<: *defaults
  kwargs:
    <<: *kwargs_common
    agent.code.model: glm-5
    agent.feedback.model: glm-5
    agent.steps: *step_count
    # Some GLM gateways reject lone system-role messages (400 invalid messages).
    # Put the prompt in user role, same pattern as aide/o1-preview.
    agent.convert_system_to_user: True
  env_vars:
    <<: *env_vars
    AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
    AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
    OPENAI_API_VERSION: ${{ secrets.OPENAI_API_VERSION }}
    # Align with aisci/glm-5 (CompletionsLLMClient + LLMConfig)
    AISCI_CLEAR_THINKING: "true"
    AISCI_MAX_TOKENS: "20480"

# Gemini 3 Flash — OpenAI-compatible endpoint (same URL as aisci/gemini-3-flash).
# Patched aideml routes ``gemini-3-*`` to backend_openai + OpenAI(base_url=OPENAI_BASE_URL).
aide/gemini-3-flash:
  <<: *defaults
  kwargs:
    <<: *kwargs_common
    agent.code.model: gemini-3-flash-preview
    agent.feedback.model: gemini-3-flash-preview
    agent.steps: *step_count
    agent.code.temp: 1.0
    agent.feedback.temp: 1.0
    # 默认 24h（秒）；宿主若 export TIME_LIMIT_SECS=…，run_agent.py 会同步覆盖 agent.time_limit（见 run_in_container）。
    agent.time_limit: 86400
    # Gemini OpenAI-compat: system-only turns map to empty GenerateContentRequest.contents → 400.
    # Same pattern as aide/glm-5 and aide/o1-preview; aisci builds user-role prompts in CompletionsLLMClient.
    agent.convert_system_to_user: True
  env_vars:
    <<: *env_vars
    TIME_LIMIT_SECS: 86400 # 默认占位；宿主若设置 TIME_LIMIT_SECS，run_agent 会覆盖并同步 agent.time_limit
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    OPENAI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/openai/"
    AISCI_REASONING_EFFORT: "high"
    AISCI_TEMPERATURE: "1.0"
    AISCI_MAX_TOKENS: "20480"
